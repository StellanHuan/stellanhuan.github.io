<!-- ═══════════════════════════════════
   Lightbox Component — V4.1
   Full-screen photo viewer with metadata
   ═══════════════════════════════════ -->
<div class="lightbox" id="lightbox" aria-hidden="true">
  <!-- Close -->
  <button class="lb-close" aria-label="关闭">&times;</button>

  <!-- Navigation -->
  <button class="lb-nav lb-prev" aria-label="上一张">‹</button>
  <button class="lb-nav lb-next" aria-label="下一张">›</button>

  <!-- Image -->
  <div class="lb-image-wrap">
    <img src="" alt="" id="lbImage">
  </div>

  <!-- Metadata panel -->
  <div class="lb-meta" id="lbMeta">
    <h3 class="lb-meta-title" id="lbTitle"></h3>
    <div class="lb-meta-grid" id="lbMetaGrid"></div>
  </div>

  <!-- Counter -->
  <div class="lb-counter" id="lbCounter"></div>
</div>
