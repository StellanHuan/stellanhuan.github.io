<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瓛瓛 — Series</title>
<link rel="icon" type="image/svg+xml" href="../../favicon.svg">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#080604;--gold:#b8934f;--gold-light:#d4b978;--gold-dim:#7a6238;--text:#d4cec4;--text-dim:#9a9288;--border:rgba(184,147,79,.12);--ease-out:cubic-bezier(.16,1,.3,1)}
  body{font-family:"PingFang SC","Hiragino Sans GB","Noto Serif SC","Songti SC",serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  .grain{position:fixed;inset:0;z-index:9990;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:256px}

  /* Nav */
  .nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1.4rem 3rem;background:rgba(8,6,4,.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
  .nav a{color:var(--text-dim);text-decoration:none;font-size:.75rem;letter-spacing:.15em;transition:color .25s}
  .nav a:hover{color:var(--gold-light)}

  /* Hero */
  .series-hero{padding:10rem 3rem 4rem;max-width:1200px;margin:0 auto}
  .series-hero .tag{font-size:.65rem;letter-spacing:.5em;color:var(--gold-dim);margin-bottom:1.5rem;display:block}
  .series-hero h1{font-size:clamp(1.8rem,3vw,2.6rem);font-weight:300;letter-spacing:.2em;color:var(--gold-light);margin-bottom:1rem}
  .series-hero .sub{font-size:.85rem;color:var(--text-dim);letter-spacing:.1em;line-height:2}

  /* Grid */
  .grid-wrap{padding:0 3rem 6rem;max-width:1400px;margin:0 auto}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:1px;background:var(--border)}
  .grid-item{position:relative;overflow:hidden;aspect-ratio:4/3;cursor:pointer;background:var(--bg)}
  .grid-item:nth-child(5n+1){aspect-ratio:3/4}
  .grid-item:nth-child(7n+5){aspect-ratio:16/9}
  .grid-item img{width:100%;height:100%;object-fit:cover;transition:transform .55s cubic-bezier(.34,1.56,.64,1);display:block}
  .grid-item:hover img{transform:scale(1.04)}
  .grid-item .overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,6,4,.88) 0%,transparent 45%);display:flex;flex-direction:column;justify-content:flex-end;padding:1.5rem;opacity:0;transition:opacity .35s}
  .grid-item:hover .overlay{opacity:1}
  .overlay .t{font-size:.9rem;color:var(--gold-light);letter-spacing:.1em}
  .overlay .m{font-size:.7rem;color:var(--text-dim);margin-top:.3rem;letter-spacing:.05em}

  /* Reveal */
  .reveal{opacity:0;transform:translateY(24px);transition:opacity .6s var(--ease-out),transform .6s var(--ease-out)}
  .reveal.visible{opacity:1;transform:translateY(0) scale(1)}

  /* Lightbox */
  .lb{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.96);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;cursor:zoom-out}
  .lb.open{opacity:1;pointer-events:auto}
  .lb img{max-width:92vw;max-height:92vh;object-fit:contain;box-shadow:0 4px 40px rgba(0,0,0,.5)}
  .lb-close{position:absolute;top:1.5rem;right:2rem;color:var(--text-dim);font-size:1.5rem;border:none;background:none;cursor:pointer;transition:color .25s}
  .lb-close:hover{color:var(--gold-light)}
  .lb-nav{position:absolute;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:2.2rem;border:none;background:none;cursor:pointer;padding:1.5rem;transition:color .25s}
  .lb-nav:hover{color:var(--gold-light)}
  .lb-prev{left:.5rem}.lb-next{right:.5rem}
  .lb-counter{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);font-size:.7rem;color:var(--text-dim);letter-spacing:.15em}
  @media(max-width:768px){.nav{padding:1rem 1.2rem}.series-hero{padding:6rem 1.2rem 2rem}.grid-wrap{padding:0 1.2rem 4rem}.grid{grid-template-columns:1fr}.lb-nav{display:none}}
</style>
</head>
<body>
<div class="grain"></div>

<nav class="nav">
  <a href="../index.html">← 返回主页</a>
  <a href="../index.html">HUANHUAN</a>
</nav>

<div class="series-hero">
  <span class="tag" id="seriesTag">SERIES</span>
  <h1 id="seriesTitle">Series</h1>
  <p class="sub" id="seriesDesc"></p>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<div class="lb" id="lb">
  <button class="lb-close">&times;</button>
  <button class="lb-nav lb-prev">‹</button>
  <img src="" alt="" id="lbImg">
  <button class="lb-nav lb-next">›</button>
  <div class="lb-counter" id="lbCounter"></div>
</div>

<script>
const series=(window.location.hash||'#portrait').replace('#','');
const meta={portrait:{zh:'肖像',en:'Portrait',tag:'PORTRAIT',desc:'Nikon Z8 · 人物の光と影'},street:{zh:'街头片段',en:'Street',tag:'STREET',desc:'郑州与东京的街头偶遇'},landscape:{zh:'风光与航拍',en:'Landscape & Aerial',tag:'LANDSCAPE & AERIAL',desc:'俯瞰与远望 · DJI & Nikon Z8'},aerial:{zh:'俯瞰',en:'Aerial',tag:'AERIAL',desc:'空からの視点 · DJI'}};
const m=meta[series]||meta.portrait;
document.getElementById('seriesTag').textContent=m.tag;
document.getElementById('seriesTitle').textContent=m.zh+' / '+m.en;
document.getElementById('seriesDesc').textContent=m.desc;

const P=[];
for(let i=1;i<=30;i++)P.push(`../images/web_${String(i).padStart(3,'0')}.jpeg?v=3`);
const offsets={portrait:0,street:6,landscape:12,aerial:18};
const start=offsets[series]||0;
const grid=document.getElementById('grid');
const indices=[];
for(let i=0;i<12;i++){const idx=(start+i)%P.length;indices.push(idx);
  const item=document.createElement('div');item.className='grid-item reveal';
  item.innerHTML=`<img src="${P[idx]}" alt="${m.zh} ${i+1}" loading="lazy" decoding="async" width="1600" height="1067"><div class="overlay"><span class="t">${m.zh} · ${i+1}</span><span class="m">Nikon Z8 · 2026</span></div>`;
  item.style.transitionDelay=`${i*.06}s`;
  item.addEventListener('click',()=>openLB(i));grid.appendChild(item);
}

// Reveal
const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')})},{threshold:.08,rootMargin:'0px 0px -30px 0px'});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));

// Lightbox
const lb=document.getElementById('lb'),lbImg=document.getElementById('lbImg'),lbCounter=document.getElementById('lbCounter');let lbIdx=0;
function openLB(i){lbIdx=i;updateLB();lb.classList.add('open');document.body.style.overflow='hidden'}
function closeLB(){lb.classList.remove('open');document.body.style.overflow=''}
function prevLB(){lbIdx=(lbIdx-1+12)%12;updateLB()}
function nextLB(){lbIdx=(lbIdx+1)%12;updateLB()}
function updateLB(){lbImg.src=P[indices[lbIdx]];lbCounter.textContent=`${lbIdx+1} / 12`}
lb.addEventListener('click',e=>{if(e.target===lb||e.target.classList.contains('lb-close'))closeLB()});
document.querySelector('.lb-prev').addEventListener('click',e=>{e.stopPropagation();prevLB()});
document.querySelector('.lb-next').addEventListener('click',e=>{e.stopPropagation();nextLB()});
document.addEventListener('keydown',e=>{if(!lb.classList.contains('open'))return;if(e.key==='Escape')closeLB();if(e.key==='ArrowLeft')prevLB();if(e.key==='ArrowRight')nextLB()});
</script>
</body>
</html>
