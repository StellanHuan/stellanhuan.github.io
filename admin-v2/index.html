<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellan CMS</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0806;--sidebar-bg:#0e0b08;--card-bg:#110d0a;--gold:#b8934f;--gold-light:#d4b978;--gold-dim:#7a6238;--text:#d4cec4;--text-dim:#8a8278;--border:rgba(184,147,79,.12);--accent-green:#7bae7f;--accent-red:#8b3a3a;--radius:8px}
  body{font-family:"PingFang SC","SF Pro Display",-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}

  .sidebar{width:220px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 0;flex-shrink:0}
  .sidebar-logo{padding:0 1.5rem 1.5rem;font-size:.9rem;font-weight:500;letter-spacing:.2em;color:var(--gold-light);border-bottom:1px solid var(--border);margin-bottom:1rem}
  .sidebar-nav{flex:1;overflow-y:auto}
  .sidebar-nav a{display:flex;align-items:center;gap:.7rem;padding:.6rem 1.5rem;color:var(--text-dim);text-decoration:none;font-size:.78rem;letter-spacing:.05em;transition:all .2s;border-left:2px solid transparent}
  .sidebar-nav a:hover{color:var(--text);background:rgba(184,147,79,.04)}
  .sidebar-nav a.active{color:var(--gold-light);background:rgba(184,147,79,.06);border-left-color:var(--gold-dim)}
  .sidebar-nav a .icon{font-size:.9rem;width:20px;text-align:center}
  .sidebar-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);font-size:.65rem;color:var(--text-dim)}
  .sidebar-footer .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:.3rem}
  .sidebar-footer .dot.online{background:var(--accent-green)}

  .main{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column}
  .sec-title{font-size:.75rem;color:var(--gold-dim);letter-spacing:.15em;margin-bottom:1rem;text-transform:uppercase}

  /* Dashboard */
  .dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.8rem;margin-bottom:1.5rem}
  .stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center}
  .stat-card .num{font-size:1.8rem;font-weight:200;color:var(--gold-light)}
  .stat-card .label{font-size:.6rem;color:var(--text-dim);letter-spacing:.1em;margin-top:.2rem}
  .dash-info{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.6rem}
  .info-row{display:flex;justify-content:space-between;align-items:center;padding:.6rem .9rem;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);font-size:.7rem}
  .info-row .key{color:var(--text-dim)}.info-row .val{color:var(--text)}.info-row .val.good{color:var(--accent-green)}.info-row .val.warn{color:var(--gold-dim)}

  /* Photos Page */
  .photos-layout{display:flex;gap:1rem;flex:1;overflow:hidden}
  .photo-filters{width:180px;flex-shrink:0;overflow-y:auto;padding-right:.5rem}
  .filter-group{margin-bottom:1.2rem}
  .filter-group h4{font-size:.6rem;color:var(--gold-dim);letter-spacing:.15em;margin-bottom:.5rem;text-transform:uppercase}
  .filter-group label{display:flex;align-items:center;gap:.4rem;font-size:.7rem;color:var(--text-dim);padding:.2rem 0;cursor:pointer}
  .filter-group input[type=checkbox]{accent-color:var(--gold)}
  .filter-group .count{color:var(--text-dim);font-size:.6rem;margin-left:auto}
  .search-box{width:100%;background:var(--card-bg);border:1px solid var(--border);color:var(--text);padding:.5rem .8rem;border-radius:4px;font-size:.7rem;margin-bottom:1rem;font-family:inherit}
  .search-box:focus{outline:none;border-color:var(--gold-dim)}
  .photo-grid-area{flex:1;overflow-y:auto}
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.5rem}
  .photo-grid.size-s{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}
  .photo-grid.size-l{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .size-btn{background:var(--card-bg);border:1px solid var(--border);color:var(--text-dim);padding:.2rem .6rem;border-radius:3px;font-size:.6rem;cursor:pointer;font-family:inherit}
  .size-btn.active,.size-btn:hover{color:var(--gold-light);border-color:var(--gold-dim)}
  .photo-card{border-radius:6px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .2s;background:var(--card-bg);position:relative}
  .photo-card:hover{border-color:var(--gold-dim)}
  .photo-card.selected{border-color:var(--gold-light)}
  .photo-card img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
  .photo-card .info{padding:.4rem .5rem;font-size:.6rem}
  .photo-card .info .t{color:var(--text);display:block}
  .photo-card .info .m{color:var(--text-dim);font-size:.55rem}
  .photo-card .check{position:absolute;top:.3rem;right:.3rem;width:18px;height:18px;border-radius:3px;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;font-size:.6rem;opacity:0;transition:opacity .2s}
  .photo-card.selected .check,.photo-card:hover .check{opacity:1}
  .photo-card .del-btn{position:absolute;top:.3rem;left:.3rem;width:18px;height:18px;border-radius:3px;background:rgba(139,58,58,.8);color:#fff;border:none;font-size:.55rem;cursor:pointer;display:none;align-items:center;justify-content:center}
  .photo-card:hover .del-btn{display:flex}
  .batch-bar{display:flex;gap:.5rem;align-items:center;padding:.5rem 0;font-size:.7rem}
  .batch-bar button{background:var(--card-bg);border:1px solid var(--border);color:var(--text-dim);padding:.3rem .8rem;border-radius:4px;cursor:pointer;font-size:.65rem;font-family:inherit}
  .batch-bar button:hover{color:var(--gold-light);border-color:var(--gold-dim)}

  .page-placeholder{display:flex;align-items:center;justify-content:center;height:60vh;color:var(--text-dim);font-size:.85rem;letter-spacing:.1em}

  /* Sections */
  .sections-list{display:flex;flex-direction:column;gap:.8rem}
  .section-block{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
  .section-block:hover{border-color:var(--gold-dim)}
  .section-head{padding:.5rem 1rem;font-size:.7rem;color:var(--gold-dim);letter-spacing:.08em;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);cursor:grab}
  .section-head .count{font-size:.6rem;color:var(--text-dim)}
  .section-photos{display:flex;gap:.4rem;padding:.5rem;flex-wrap:wrap;min-height:50px;transition:background .2s}
  .section-photos.drag-over{background:rgba(184,147,79,.06)}
  .drop-target{position:relative}
  .section-photo{width:70px;text-align:center;position:relative}
  .section-photo img{width:70px;height:52px;object-fit:cover;border-radius:3px;display:block;border:1px solid var(--border)}
  .section-photo.empty{width:70px;height:52px;display:flex;align-items:center;justify-content:center;border:1px dashed var(--border);border-radius:3px;font-size:.55rem;color:var(--text-dim)}
  .section-photo .remove-btn{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.9);color:var(--text);border:none;font-size:.55rem;cursor:pointer;display:none;align-items:center;justify-content:center}
  .section-photo:hover .remove-btn{display:flex}
  .section-photo .photo-label{font-size:.5rem;color:var(--text-dim);display:block;margin-top:.1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:70px}
  .add-photo-grid{display:flex;gap:.4rem;flex-wrap:wrap}
  .add-photo-card{width:70px;text-align:center;cursor:grab;opacity:.8;transition:opacity .2s}
  .add-photo-card:hover{opacity:1}
  .add-photo-card img{width:70px;height:52px;object-fit:cover;border-radius:3px;display:block;border:1px solid var(--border)}
  .add-photo-card span{font-size:.5rem;color:var(--text-dim);display:block;margin-top:.1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:70px}

  /* Project/Print/Exhibition cards */
  .proj-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.5rem;overflow:hidden}
  .proj-head{padding:.6rem 1rem;display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:var(--text);border-bottom:1px solid var(--border)}
  .proj-body{padding:.6rem 1rem;font-size:.65rem;color:var(--text-dim);line-height:1.6}
  .btn-sm{background:var(--card-bg);border:1px solid var(--border);color:var(--text-dim);padding:.3rem .7rem;border-radius:4px;cursor:pointer;font-size:.6rem;font-family:inherit;transition:all .2s}
  .btn-sm:hover{color:var(--gold-light);border-color:var(--gold-dim)}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">STELLAN CMS</div>
  <nav class="sidebar-nav">
    <a href="#dashboard" class="active" data-route="dashboard"><span class="icon">⌂</span> Dashboard</a>
    <a href="#photos" data-route="photos"><span class="icon">📷</span> Photos</a>
    <a href="#sections" data-route="sections"><span class="icon">⊞</span> Sections</a>
    <a href="#journal" data-route="journal"><span class="icon">✍</span> Journal</a>
    <a href="#projects" data-route="projects"><span class="icon">🗂</span> Projects</a>
    <a href="#prints" data-route="prints"><span class="icon">🖼</span> Prints</a>
    <a href="#exhibitions" data-route="exhibitions"><span class="icon">🏛</span> Exhibitions</a>
    <a href="#settings" data-route="settings"><span class="icon">⚙</span> Settings</a>
  </nav>
  <div class="sidebar-footer">
    <button onclick="deploy()" style="width:100%;background:var(--gold-dim);color:var(--bg);border:none;padding:.4rem;border-radius:4px;cursor:pointer;font-size:.65rem;font-family:inherit;margin-bottom:.5rem;letter-spacing:.05em">🚀 导出 data.js</button>
    <span class="dot online"></span> GitHub Connected · v2.0
  </div>
</aside>

<main class="main" id="mainContent"></main>

<script src="../data.js"></script>
<script>
// ═══ STORE ═══
// Load from LocalStorage first, fallback to data.js
const savedPhotos=JSON.parse(localStorage.getItem('cms_photos')||'null');
const savedSections=JSON.parse(localStorage.getItem('cms_sections')||'null');
const store={
  photos: savedPhotos||SITE_DATA?.photos||[],
  sections: savedSections||JSON.parse(JSON.stringify(SITE_DATA?.sections||{})),
  selectedPhotos: new Set(),
  filters: {series:[],tags:[],search:''},
  projects: JSON.parse(localStorage.getItem('cms_projects')||'[]'),
  prints: JSON.parse(localStorage.getItem('cms_prints')||'[]'),
  exhibitions: JSON.parse(localStorage.getItem('cms_exhibitions')||'[]')
};

function saveStore(){
  // Strip data URLs before saving (too big for localStorage)
  const cleanPhotos=store.photos.map(p=>{const{_dataUrl,...c}=p;return c});
  localStorage.setItem('cms_photos',JSON.stringify(cleanPhotos));
  localStorage.setItem('cms_sections',JSON.stringify(store.sections));
}

window.addEventListener('beforeunload',()=>{
  saveStore();
  localStorage.setItem('cms_projects',JSON.stringify(store.projects));
  localStorage.setItem('cms_prints',JSON.stringify(store.prints));
  localStorage.setItem('cms_exhibitions',JSON.stringify(store.exhibitions));
});

// ═══ ROUTER ═══
const pages={dashboard,photos,sections:renderSections,journal:renderJournal,projects:renderProjects,prints:renderPrints,exhibitions:renderExhibitions,settings:renderSettings};
function p(n){return `<div class="page-placeholder">${n} — 开发中</div>`}

// ═══ TOAST + DEPLOY ═══
function showToast(msg){let t=document.getElementById('adminToast');if(!t){t=document.createElement('div');t.id='adminToast';t.style.cssText='position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#b8934f;color:#0d0a06;padding:.7rem 2rem;border-radius:8px;font-size:.8rem;z-index:999;transition:opacity .3s';document.body.appendChild(t)}t.textContent=msg;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2500)}
function deploy(){const data={photos:store.photos,sections:store.sections};const js='// Stellan CMS export\nconst SITE_DATA = '+JSON.stringify(data,null,2)+';';const blob=new Blob([js],{type:'text/javascript'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='data.js';a.click();showToast('💾 data.js 已下载！去 GitHub 替换文件')}

// ═══ JOURNAL ═══
function renderJournal(){return `<div class="sec-title">✍ Journal 编辑器</div><div style="display:flex;gap:1rem;height:calc(100vh - 200px)"><div style="flex:1;display:flex;flex-direction:column"><input class="search-box" placeholder="文章标题" id="jTitle" style="margin-bottom:.5rem"><textarea id="jBody" style="flex:1;background:var(--card-bg);border:1px solid var(--border);color:var(--text);padding:1rem;border-radius:4px;font-family:inherit;font-size:.8rem;resize:none;line-height:1.8" placeholder="Markdown 正文...\n\n支持 Markdown 语法"></textarea></div><div style="flex:1;background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:1rem;overflow-y:auto;font-size:.8rem;line-height:1.8;color:var(--text)" id="jPreview"><span style="color:var(--text-dim)">👈 写完点预览</span></div></div><div style="margin-top:.5rem;display:flex;gap:.5rem"><button class="btn" onclick="previewJournal()" style="background:var(--card-bg);border:1px solid var(--border);color:var(--text-dim);padding:.4rem 1rem;border-radius:4px;cursor:pointer;font-size:.65rem;font-family:inherit">👁 预览</button><button class="btn" onclick="exportJournal()" style="background:var(--card-bg);border:1px solid var(--border);color:var(--text-dim);padding:.4rem 1rem;border-radius:4px;cursor:pointer;font-size:.65rem;font-family:inherit">💾 导出 MD</button></div>`}
function previewJournal(){const t=document.getElementById('jTitle')?.value||'未命名';const b=document.getElementById('jBody')?.value||'';document.getElementById('jPreview').innerHTML=`<h2 style="color:var(--gold-light);margin-bottom:1rem;font-size:1rem">${t}</h2>${b.replace(/\n/g,'<br>')}`}
function exportJournal(){const t=document.getElementById('jTitle')?.value||'journal';const b=document.getElementById('jBody')?.value||'';const md=`# ${t}\n\n${b}`;const blob=new Blob([md],{type:'text/markdown'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${t}.md`;a.click();showToast('💾 '+t+'.md 已导出')}

function navigate(route){
  document.querySelectorAll('.sidebar-nav a').forEach(a=>a.classList.toggle('active',a.dataset.route===route));
  document.getElementById('mainContent').innerHTML=pages[route]?pages[route]():pages.dashboard();
  window.location.hash=route;
}

window.addEventListener('hashchange',()=>navigate(window.location.hash.replace('#','')||'dashboard'));
document.querySelectorAll('.sidebar-nav a').forEach(a=>a.addEventListener('click',e=>{e.preventDefault();navigate(a.dataset.route)}));

// ═══ DASHBOARD ═══
function dashboard(){
  const p=store.photos.length;
  const s=Object.keys(store.sections).length;
  const used=new Set(Object.values(store.sections).flat()).size;
  return `<div class="sec-title">Dashboard</div>
    <div class="dash-grid">
      <div class="stat-card"><div class="num">${p}</div><div class="label">📷 照片</div></div>
      <div class="stat-card"><div class="num">${s}</div><div class="label">⊞ 区块</div></div>
      <div class="stat-card"><div class="num">${used}</div><div class="label">已使用</div></div>
      <div class="stat-card"><div class="num">${p-used}</div><div class="label">未使用</div></div>
      <div class="stat-card"><div class="num">${(store.projects||[]).length}</div><div class="label">🗂 Projects</div></div>
      <div class="stat-card"><div class="num">${(store.prints||[]).length}</div><div class="label">🖼 Prints</div></div>
      <div class="stat-card"><div class="num">${(store.exhibitions||[]).length}</div><div class="label">🏛 Exhibitions</div></div>
    </div>
    <div class="sec-title">站点健康</div>
    <div class="dash-info">
      <div class="info-row"><span class="key">GitHub</span><span class="val good">Connected ✅</span></div>
      <div class="info-row"><span class="key">Last Deploy</span><span class="val">${new Date().toISOString().split('T')[0]}</span></div>
      <div class="info-row"><span class="key">图片大小</span><span class="val warn">27MB</span></div>
      <div class="info-row"><span class="key">未使用照片</span><span class="val warn">${p-used} 张</span></div>
    </div>`;
}

// ═══ PHOTOS PAGE ═══
function photos(){
  const allTags=[...new Set(store.photos.flatMap(p=>p.tags||[]))].sort();
  const allSeries=[...new Set(store.photos.map(p=>p.series).filter(Boolean))].sort();
  const usedFiles=new Set(Object.values(store.sections).flat());

  return `<div class="photos-layout">
    <div class="photo-filters">
      <input class="search-box" placeholder="搜索照片..." oninput="applyFilters(this.value)">
      <div class="filter-group">
        <h4>系列</h4>
        ${allSeries.map(s=>`<label><input type="checkbox" value="${s}" onchange="toggleFilter('series','${s}')"> ${s}</label>`).join('')}
      </div>
      <div class="filter-group">
        <h4>标签</h4>
        ${allTags.map(t=>`<label><input type="checkbox" value="${t}" onchange="toggleFilter('tags','${t}')"> ${t}</label>`).join('')}
      </div>
      <div class="filter-group">
        <h4>其他</h4>
        <label><input type="checkbox" onchange="toggleFilter('unused')"> 未使用照片 <span class="count">${store.photos.filter(p=>!usedFiles.has(p.file.split('/').pop())).length}</span></label>
      </div>
    </div>
    <div class="photo-grid-area">
      <div class="batch-bar">
        <span id="selectedCount">已选 0 张</span>
        <button onclick="batchTag()">批量标签</button>
        <button onclick="batchSeries()">批量系列</button>
        <button onclick="clearSelection()">取消选择</button>
        <span style="flex:1"></span>
        <button onclick="document.getElementById('uploadInput').click()" style="background:var(--gold-dim);color:var(--bg)">📤 本地上传</button>
        <input type="file" id="uploadInput" accept="image/*" multiple style="display:none" onchange="handleUpload(this.files)">
        <span style="font-size:.6rem;color:var(--text-dim);margin-left:.5rem">视图:</span>
        <button onclick="setGridSize('s')" class="size-btn">小</button>
        <button onclick="setGridSize('m')" class="size-btn active">中</button>
        <button onclick="setGridSize('l')" class="size-btn">大</button>
      </div>
      <div class="photo-grid" id="photoGrid"></div>
    </div>
  </div>`;
}

function renderPhotoGrid(){
  const grid=document.getElementById('photoGrid');
  if(!grid)return;
  const usedFiles=new Set(Object.values(store.sections).flat());
  let filtered=store.photos;
  if(store.filters.series.length) filtered=filtered.filter(p=>store.filters.series.includes(p.series));
  if(store.filters.tags.length) filtered=filtered.filter(p=>p.tags&&p.tags.some(t=>store.filters.tags.includes(t)));
  if(store.filters.unused) filtered=filtered.filter(p=>!usedFiles.has(p.file.split('/').pop()));
  if(store.filters.search){
    const q=store.filters.search.toLowerCase();
    filtered=filtered.filter(p=>p.title.toLowerCase().includes(q)||p.file.toLowerCase().includes(q));
  }
  
  grid.innerHTML=filtered.map(p=>{
    const f=p.file.split('/').pop();
    const sel=store.selectedPhotos.has(f);
    const src=p._dataUrl?p._dataUrl:`../${p.file}`;
    return `<div class="photo-card ${sel?'selected':''}" data-file="${f}" onclick="togglePhoto('${f}',event)">
      <img src="${src}" alt="${p.title}" loading="lazy">
      <div class="check">${sel?'✓':''}</div>
      <button class="del-btn" onclick="event.stopPropagation();deletePhoto('${f}')">🗑</button>
      <div class="info"><span class="t">${p.title}</span><span class="m">${p.series||''} · ${(p.tags||[]).slice(0,2).join(' ')}</span></div>
    </div>`;
  }).join('');
  
  document.getElementById('selectedCount').textContent=`已选 ${store.selectedPhotos.size} 张`;
}

window.togglePhoto=function(file,e){
  if(e.shiftKey||e.metaKey){
    store.selectedPhotos.has(file)?store.selectedPhotos.delete(file):store.selectedPhotos.add(file);
  }else{
    store.selectedPhotos.clear();
    store.selectedPhotos.add(file);
  }
  renderPhotoGrid();
};

window.toggleFilter=function(type,val){
  if(type==='unused'){store.filters.unused=!store.filters.unused}
  else{const arr=store.filters[type];arr.includes(val)?arr.splice(arr.indexOf(val),1):arr.push(val)}
  renderPhotoGrid();
};

window.applyFilters=function(q){store.filters.search=q;renderPhotoGrid()};
window.clearSelection=function(){store.selectedPhotos.clear();renderPhotoGrid()};
window.deletePhoto=function(file){if(!confirm('确定删除这张照片？'))return;store.photos=store.photos.filter(p=>p.file.split('/').pop()!==file);Object.keys(store.sections).forEach(k=>{store.sections[k]=store.sections[k].filter(f=>f!==file)});store.selectedPhotos.delete(file);saveStore();renderPhotoGrid();showToast('🗑 已删除')};
window.setGridSize=function(s){
  document.querySelectorAll('.size-btn').forEach(b=>b.classList.toggle('active',b.textContent==={s:'小',m:'中',l:'大'}[s]));
  const grid=document.getElementById('photoGrid');grid.className='photo-grid size-'+s;
};
window.batchTag=function(){if(!store.selectedPhotos.size)return showToast('请先选择照片');const tag=prompt('输入标签 (逗号分隔)');if(!tag)return;const tags=tag.split(',').map(t=>t.trim());store.selectedPhotos.forEach(f=>{const p=store.photos.find(pp=>pp.file.split('/').pop()===f);if(p){p.tags=[...new Set([...(p.tags||[]),...tags])]}});store.selectedPhotos.clear();renderPhotoGrid();showToast('✅ 标签已添加')};
window.batchSeries=function(){if(!store.selectedPhotos.size)return showToast('请先选择照片');const series=prompt('输入系列 (portrait/street/landscape/aerial)');if(!series)return;store.selectedPhotos.forEach(f=>{const p=store.photos.find(pp=>pp.file.split('/').pop()===f);if(p)p.series=series});store.selectedPhotos.clear();renderPhotoGrid();showToast('✅ 系列已更新')};

// ═══ UPLOAD ═══
window.handleUpload=function(files){
  if(!files.length)return;
  let processed=0;
  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=function(e){
      const name='upload_'+Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9.]/g,'_');
      store.photos.push({file:name,title:file.name.replace(/\.[^.]+$/,''),series:'portrait',tags:['上传'],_dataUrl:e.target.result,_size:file.size});
      processed++;
      if(processed===files.length){saveStore();renderPhotoGrid();showToast(`✅ 已添加 ${processed} 张照片。导出 data.js 时会一并打包`)}
    };
    reader.readAsDataURL(file);
  });
};

// Override deploy to include uploaded photos
const origDeploy=deploy;
deploy=function(){
  const cleanPhotos=store.photos.map(p=>{const{_dataUrl,_size,...clean}=p;return clean});
  const data={photos:cleanPhotos,sections:store.sections};
  const js='// Stellan CMS export\nconst SITE_DATA = '+JSON.stringify(data,null,2)+';';
  const blob=new Blob([js],{type:'text/javascript'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='data.js';a.click();
  // Also offer zip of new images if any
  const newPhotos=store.photos.filter(p=>p._dataUrl);
  if(newPhotos.length){
    setTimeout(()=>{
      const msg='你有 '+newPhotos.length+' 张新上传的照片需要手动放到 images/ 文件夹。\n文件名已列在下载的 data.js 中。';
      showToast('📤 '+msg);
    },500);
  }
  showToast('💾 data.js 已下载！有新照片请手动放到 images/ 文件夹');
};

window.exportAll=function(){
  const data={photos:store.photos,sections:store.sections,projects:store.projects||[],prints:store.prints||[],exhibitions:store.exhibitions||[],exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='stellan-cms-export.json';a.click();
  showToast('📦 全部数据已导出');

function renderSections(){
  const names={hero:'🎬 Hero',featured:'01 目光所及',hscroll:'02 街头的呼吸',landscape:'03 大地(左)',aerial:'03 天空(右)',about:'05 关于',booking_portrait:'04 预约·人像',booking_event:'04 预约·活动',booking_aerial:'04 预约·航拍'};
  let html='<div class="sec-title">Sections 区块编辑器</div><p style="font-size:.65rem;color:var(--text-dim);margin-bottom:1rem">拖拽照片到区块 / 拖区块排序 / 点照片移除</p><div class="sections-list" id="sectionsList">';
  for(const[key,name]of Object.entries(names)){
    const files=store.sections[key]||[];
    html+=`<div class="section-block" data-section="${key}" draggable="true">
      <div class="section-head">⋮⋮ ${name} <span class="count">${files.length}张</span></div>
      <div class="section-photos drop-target" data-section="${key}" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="handleSectionDrop('${key}',event)">
        ${files.map(f=>{
          const p=store.photos.find(pp=>pp.file.split('/').pop()===f);
          return p?`<div class="section-photo" data-file="${f}"><img src="../${p.file}" alt=""><button class="remove-btn" onclick="removeFromSection('${key}','${f}')">×</button><span class="photo-label">${p.title}</span></div>`:`<div class="section-photo empty">—</div>`;
        }).join('')||'<div class="section-photo empty">拖照片到这里</div>'}
      </div>
    </div>`;
  }
  html+='</div><div class="sec-title" style="margin-top:1.5rem">添加照片</div><div class="add-photo-grid" id="addPhotoGrid"></div>';
  setTimeout(()=>renderAddPhotoGrid(),50);
  return html;
}

function renderAddPhotoGrid(){
  const grid=document.getElementById('addPhotoGrid');
  if(!grid)return;
  const usedFiles=new Set(Object.values(store.sections).flat());
  const unused=store.photos.filter(p=>!usedFiles.has(p.file.split('/').pop()));
  grid.innerHTML=unused.map(p=>`<div class="add-photo-card" draggable="true" data-file="${p.file.split('/').pop()}" ondragstart="event.dataTransfer.setData('text/plain','${p.file.split('/').pop()}')"><img src="../${p.file}" alt=""><span>${p.title}</span></div>`).join('')||'<span style="color:var(--text-dim);font-size:.7rem">所有照片已分配 ✓</span>';
}

window.handleSectionDrop=function(key,e){
  e.target.classList.remove('drag-over');
  const file=e.dataTransfer.getData('text/plain');
  if(!file)return;
  if(!store.sections[key])store.sections[key]=[];
  if(!store.sections[key].includes(file)){
    store.sections[key].push(file);
    saveStore();
    navigate('sections');
  }
};

window.removeFromSection=function(key,file){
  store.sections[key]=store.sections[key].filter(f=>f!==file);
  saveStore();
  navigate('sections');
};
