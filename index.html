<!DOCTYPE html>
<html lang="zh-CN" data-current-lang="zh">
<head>
<meta charset="UTF-8">
<meta name="description" content="Stellan Huan · Nikon Z8 · 郑州与东京之间的光 · 摄影作品集">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Stellan HuanHuan — Photography</title>
<meta property="og:title" content="藏魄">
<meta property="og:description" content="Nikon Z8 · 郑州·东京">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<style>
  html[data-current-lang="zh"] [data-lang="ja"],
  html[data-current-lang="zh"] [data-lang="en"],
  html[data-current-lang="ja"] [data-lang="zh"],
  html[data-current-lang="ja"] [data-lang="en"],
  html[data-current-lang="en"] [data-lang="zh"],
  html[data-current-lang="en"] [data-lang="ja"]{display:none!important}
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#080604;--gold:#b8934f;--gold-light:#d4b978;--gold-dim:#7a6238;
    --text:#d4cec4;--text-dim:#9a9288;--text-bright:#e8e0d4;--border:rgba(184,147,79,.12);
    --spring: cubic-bezier(.34,1.56,.64,1);
    --ease-out: cubic-bezier(.16,1,.3,1);
    --ease-in-out: cubic-bezier(.65,0,.35,1);
  }

  body{
    font-family:"PingFang SC","Hiragino Sans GB","Noto Serif SC","Songti SC",serif;
    background:var(--bg);color:var(--text);line-height:1.7;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;
  }



  /* ===== NAV (language switch inside) ===== */
  .nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    display:flex;justify-content:space-between;align-items:center;
    padding:1.4rem 3rem;
    background:rgba(8,6,4,.7);backdrop-filter:blur(16px) saturate(.8);
    -webkit-backdrop-filter:blur(16px) saturate(.8);
    transition:transform .4s var(--ease-in-out),opacity .4s var(--ease-in-out);
  }
  .nav.hidden{transform:translateY(-100%);opacity:0}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;width:100%}
  .nav-logo{color:var(--gold-light);text-decoration:none;font-size:1.1rem;letter-spacing:.35em;font-weight:300;font-style:italic;text-shadow:0 0 20px rgba(184,147,79,.25)}
  .nav-links{display:flex;align-items:center;gap:2rem}
  .nav-links a{color:var(--text-dim);text-decoration:none;font-size:.7rem;letter-spacing:.12em;transition:color .25s}
  .nav-links a:hover{color:var(--gold-light)}
  .lang-dot{position:relative;display:flex;align-items:center}
  .lang-current{background:none;border:1px solid var(--border);color:var(--gold-light);font-size:.65rem;padding:.3rem .6rem;border-radius:4px;font-family:inherit;letter-spacing:.1em;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:.3rem}
  .lang-current::after{content:'▾';font-size:.5rem;transition:transform .25s}
  .lang-current.open::after{transform:rotate(180deg)}
  .lang-dropdown{position:absolute;top:100%;right:0;margin-top:.3rem;background:rgba(14,11,8,.95);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:4px;padding:.3rem;display:none;flex-direction:column;gap:.1rem;z-index:300}
  .lang-dropdown.open{display:flex}
  .lang-dropdown button{background:none;border:none;color:var(--text-dim);font-size:.65rem;padding:.4rem .8rem;font-family:inherit;letter-spacing:.1em;border-radius:3px;text-align:center;transition:all .2s}
  .lang-dropdown button:hover{color:var(--gold-light);background:rgba(184,147,79,.08)}
  .lang-dropdown button.active{color:var(--gold-light)}

  /* ===== HERO ===== */
  .hero{
    height:100vh;display:flex;align-items:flex-end;justify-content:flex-start;
    position:relative;overflow:hidden;padding:0 0 4rem 2.5rem;
  }
  .hero-bg{
    position:absolute;inset:0;z-index:1;
    background:linear-gradient(to top,rgba(8,6,4,.25) 0%,rgba(8,6,4,.05) 60%,rgba(8,6,4,0) 100%);
  }
  .hero-img{
    position:absolute;inset:0;z-index:0;width:100%;height:100%;object-fit:cover;
    will-change:transform;
  }
  .hero-content{position:absolute;left:5%;bottom:8%;z-index:2;max-width:500px}
  .hero h1{font-size:clamp(2rem,4vw,3.5rem);font-weight:200;letter-spacing:.3em;color:var(--gold-light);margin-bottom:.2rem;opacity:0;transform:translateY(24px);filter:blur(4px);transition:opacity 1s var(--ease-out),transform 1s var(--ease-out),filter 1s var(--ease-out)}
  .hero.loaded h1{opacity:1;transform:translateY(0);filter:blur(0)}
  .hero .ja{font-size:.7rem;letter-spacing:.4em;color:var(--gold-dim);margin-bottom:.8rem;opacity:0;transform:translateY(16px);transition:opacity .8s var(--ease-out) .25s,transform .8s var(--ease-out) .25s}
  .hero.loaded .ja{opacity:1;transform:translateY(0)}
  
  
  .hero .intro{font-size:.8rem;color:#f0e8d8;letter-spacing:.08em;line-height:1.8;opacity:0;transform:translateY(12px);transition:opacity .8s var(--ease-out) .65s,transform .8s var(--ease-out) .65s}
  .hero.loaded .intro{opacity:1;transform:translateY(0)}

  /* ===== REVEAL (spring scale + fade) ===== */
  .reveal{
    opacity:0;transform:translateY(36px) scale(.97);
    transition:opacity .75s var(--ease-out),transform .75s var(--ease-out);
  }
  .reveal.visible{opacity:1;transform:translateY(0) scale(1)}
  .reveal-d1{transition-delay:.1s}.reveal-d2{transition-delay:.2s}.reveal-d3{transition-delay:.35s}

  /* ===== MACRO TYPE ===== */
  .macro-type{padding:5rem 3rem;max-width:800px;margin:0 auto}
  .macro-type .big{font-size:clamp(1.8rem,4vw,3rem);line-height:1.8;letter-spacing:.04em;color:var(--text-bright);font-weight:200}
  .macro-type .big .hl{color:var(--gold-light)}
  .macro-type .ref{margin-top:2rem;font-size:.7rem;color:var(--text-dim);letter-spacing:.2em;text-align:right}

  /* ===== FULL IMAGE ===== */

  /* ===== BLOCK HEADER ===== */
  .block-head{
    padding:8rem 3rem 1.5rem;max-width:1200px;margin:0 auto;
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:1px solid var(--border);
  }
  .block-head .left .num{font-size:.6rem;letter-spacing:.4em;color:var(--gold-dim);display:block;margin-bottom:.6rem}
  .block-head .left h2{font-size:1.3rem;font-weight:400;letter-spacing:.2em;color:var(--gold-light)}
  .block-head .more-link{
    font-size:.75rem;color:var(--gold-light);letter-spacing:.1em;text-decoration:none;
    border:1px solid var(--gold-dim);padding:.7rem 1.6rem;border-radius:4px;
    transition:all .3s var(--ease-out);flex-shrink:0;
  }
  .block-head .more-link:hover{background:var(--gold-dim);color:var(--bg)}


  /* Masonry Editorial Grid */
  .masonry{display:grid;grid-template-columns:2fr 1fr 1fr;grid-auto-rows:340px;gap:1rem;padding:3rem 2.5rem;max-width:1400px;margin:0 auto}
  .masonry>:first-child{grid-column:1;grid-row:span 2}
  .masonry>:nth-child(2){grid-column:2;grid-row:1}
  .masonry>:nth-child(3){grid-column:3;grid-row:1}
  .masonry>:nth-child(4){grid-column:2/4;grid-row:2}
  .masonry .duo-item{border-radius:4px;overflow:hidden;position:relative}
  .masonry .duo-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .55s var(--ease-spring)}
  
  .masonry>:nth-child(5){grid-column:1/3;grid-row:span 1}
  .masonry>:nth-child(6){grid-column:3;grid-row:span 1}
  .masonry>:nth-child(7){grid-column:1;grid-row:span 1}
  .masonry>:nth-child(8){grid-column:2/4;grid-row:span 1}
  .masonry>:nth-child(9){grid-column:1/3;grid-row:span 1}
  .masonry .duo-item{border-radius:4px;overflow:hidden;position:relative}
  .masonry .duo-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease,filter .5s ease}
  .masonry .duo-item:hover img{transform:scale(1.03)}
  /* ===== DUO ===== */
  .duo{display:flex;gap:1rem;padding:3rem 2.5rem;max-width:1400px;margin:0 auto}
  .duo-item{position:relative;overflow:hidden;border-radius:4px}
  .duo-item:nth-child(1){flex:1.5}.duo-item:nth-child(2){flex:1}
  .duo-item img{width:100%;height:100%;object-fit:cover;display:block;
    transition:transform .55s var(--spring);}
  .duo-item:hover img{transform:scale(1.03)}
  .duo-overlay{position:absolute;inset:0;
    background:linear-gradient(to top,rgba(8,6,4,.9) 0%,rgba(8,6,4,0) 60%);
    display:flex;flex-direction:column;justify-content:flex-end;padding:2rem;
    opacity:0;transform:translateY(12px);
    transition:opacity .4s var(--ease-out),transform .5s var(--ease-out)}
  .duo-item:hover .duo-overlay{opacity:1;transform:translateY(0)}
  .duo-overlay .duo-title{font-size:1rem;color:var(--gold-light);letter-spacing:.15em;margin-bottom:.3rem}
  .duo-overlay .duo-meta{font-size:.7rem;color:var(--text-dim);letter-spacing:.08em}
  .duo-label{position:absolute;top:1.5rem;left:1.5rem;font-size:.65rem;letter-spacing:.3em;color:var(--text-bright);padding:.4rem 1rem;background:rgba(8,6,4,.8);backdrop-filter:blur(10px);border-radius:4px;text-shadow:0 1px 3px rgba(0,0,0,.6);transition:opacity .3s}
  .duo-item:hover .duo-label{opacity:.5}

  /* ===== H-SCROLL ===== */
  .hscroll-wrap{padding:4rem 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
  .hscroll-head{padding:0 2.5rem 1.5rem;max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end}
  .hscroll-head .left .tag{font-size:.65rem;letter-spacing:.5em;color:var(--gold-dim);display:block;margin-bottom:.8rem}
  .hscroll-head .left h3{font-size:1.2rem;font-weight:400;letter-spacing:.2em;color:var(--gold-light)}
  .hscroll-head .more-link{font-size:.75rem;color:var(--gold-light);letter-spacing:.1em;text-decoration:none;border:1px solid var(--gold-dim);padding:.7rem 1.6rem;border-radius:4px;transition:all .3s var(--ease-out);flex-shrink:0}
  .hscroll-head .more-link:hover{background:var(--gold-dim);color:var(--bg)}
  .hscroll-track{display:flex;gap:1.5rem;padding:0 2.5rem;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;scroll-behavior:smooth}
  .hscroll-track::-webkit-scrollbar{display:none}
  .hscroll-dots{display:flex;justify-content:center;gap:.5rem;padding:1.5rem 0 0}
  .hscroll-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .3s}
  .hscroll-dot.active{background:var(--gold-dim)}
  .hscroll-card{flex:0 0 auto;width:clamp(280px,85vw,650px);scroll-snap-align:center;border-radius:4px;overflow:hidden;background:#0e0b08}
  .hscroll-card img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;
    transition:transform .45s var(--spring)}
  .hscroll-card .info{padding:1rem 1.2rem;display:flex;justify-content:space-between;font-size:.7rem;background:#0e0b08}
  .hscroll-card .info .t{color:var(--text-bright)}.hscroll-card .info .m{color:var(--text-dim)}

  /* ===== ABOUT ===== */
  .about-section{padding:5rem 3rem 5rem;max-width:1000px;margin:0 auto;display:flex;gap:4rem;align-items:center;border-top:1px solid var(--border)}
  .about-visual{flex:1;border-radius:4px;overflow:hidden}
  .about-visual img{width:100%;display:block;object-fit:contain;max-height:650px;aspect-ratio:4/5}
  .about-text{flex:1.15}
  .about-text .about-num{font-size:.65rem;letter-spacing:.5em;color:var(--gold-dim);margin-bottom:1.5rem;display:block}
  .about-text h3{font-size:1.2rem;font-weight:400;letter-spacing:.18em;color:var(--gold-light);margin-bottom:1.5rem}
  .about-text .about-lead{font-size:.95rem;color:var(--text-bright);line-height:2;letter-spacing:.04em;margin-bottom:2rem}
  .about-text .timeline{display:grid;grid-template-columns:1fr 1fr;gap:.8rem 2rem;margin-bottom:2rem}
  .about-text .timeline-item{font-size:.78rem;padding:.6rem 0;border-bottom:1px solid var(--border)}
  .about-text .timeline-item .year{color:var(--gold-dim);font-size:.65rem;letter-spacing:.15em;display:block;margin-bottom:.3rem}
  .about-text .timeline-item .event{color:var(--text-dim);line-height:1.6}
  .about-text .pills{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:2.5rem}
  .about-text .pills span{font-size:.65rem;color:var(--text-dim);padding:.35rem 1rem;border:1px solid var(--border);border-radius:20px;letter-spacing:.08em;transition:all .35s var(--spring);cursor:default}
  .about-text .pills span:hover{color:var(--gold-light);border-color:var(--gold-dim);transform:translateY(-2px);box-shadow:0 4px 12px rgba(184,147,79,.1)}

  /* ===== CONTACT ===== */
  .contact{padding:5rem 3rem;text-align:center;border-top:1px solid var(--border)}
  .contact-inner{max-width:700px;margin:0 auto}
  .contact h3{font-size:1rem;font-weight:400;letter-spacing:.25em;color:var(--gold-light);margin-bottom:1rem}
  .contact-brand{font-size:.8rem;color:var(--text-dim);letter-spacing:.1em;margin-bottom:2.5rem}
  .contact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-bottom:2rem}
  .contact-col{text-align:center;padding:1.5rem;border:1px solid var(--border);border-radius:6px}
  .contact-label{display:block;font-size:.6rem;color:var(--gold-dim);letter-spacing:.15em;margin-bottom:.5rem}
  .contact-val{display:block;font-size:.8rem;color:var(--text-bright);margin-bottom:.8rem}
  .contact-btn{background:none;border:1px solid var(--gold-dim);color:var(--gold-light);padding:.3rem 1rem;border-radius:4px;font-size:.65rem;cursor:pointer;font-family:inherit;letter-spacing:.1em}
  .contact-btn:hover{background:var(--gold-dim);color:var(--bg)}
  .contact-cta-link{display:inline-block;padding:.6rem 2rem;border:1px solid var(--gold-dim);color:var(--gold-light);text-decoration:none;border-radius:4px;font-size:.75rem;letter-spacing:.1em;transition:all .3s}
  .contact-cta-link:hover{background:var(--gold-dim);color:var(--bg)}
  footer{padding:3rem 3rem 2rem;text-align:center;border-top:1px solid var(--border)}
  .footer-tags{display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
  .footer-tags span{font-size:.6rem;color:var(--text-dim);padding:.2rem .8rem;border:1px solid var(--border);border-radius:20px;letter-spacing:.08em}
  .footer-links{display:flex;justify-content:center;gap:1.5rem;flex-wrap:wrap;margin-bottom:1.5rem;font-size:.6rem}
  .footer-links a{color:var(--gold-dim);text-decoration:none;letter-spacing:.08em}
  .footer-links a:hover{color:var(--gold-light)}
  .footer-social{display:flex;justify-content:center;gap:1.5rem;margin-bottom:1.5rem;font-size:.6rem;color:var(--text-dim);letter-spacing:.08em}
  footer span{display:block;font-size:.55rem;color:var(--text-dim);letter-spacing:.08em;line-height:1.8}

  /* ===== BOOKING CARDS ===== */
  .bk-card{transition:transform .45s cubic-bezier(.16,1,.3,1),box-shadow .45s cubic-bezier(.16,1,.3,1)}
  .bk-card:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.4)}
  .bk-card .bk-photo img{will-change:transform}
  .bk-card:hover .bk-photo img{transform:scale(1.04)}
  .bk-card:hover .bk-info{background:rgba(8,6,4,.98)!important}
  .booking-cards{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
  .booking-card{flex:1;min-width:200px;max-width:260px;padding:2.2rem 1.8rem;border:1px solid var(--border);border-radius:8px;background:rgba(14,11,8,.4);text-align:center;transition:all .4s var(--ease-out);cursor:default}
  .booking-card:hover{transform:translateY(-4px);border-color:var(--gold-dim);box-shadow:0 8px 24px rgba(0,0,0,.3)}
  .booking-card .bk-tag{font-size:.65rem;color:var(--gold-dim);letter-spacing:.25em;margin-bottom:1.2rem}
  .booking-card .bk-price{font-size:2rem;color:var(--gold-light);font-weight:200;letter-spacing:.03em;margin-bottom:.8rem}
  .booking-card .bk-price small{font-size:.9rem;color:var(--gold-dim)}
  .booking-card .bk-desc{font-size:.72rem;color:var(--text-dim);line-height:1.9;letter-spacing:.03em}
  .booking-card .bk-note{margin-top:1rem;font-size:.6rem;color:var(--gold-dim);letter-spacing:.1em;opacity:.6}
  .parallax{will-change:transform}

  /* ===== GRAIN ===== */
  .grain{position:fixed;inset:0;z-index:9990;pointer-events:none;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:256px}

  /* Scroll progress bar */
  .scroll-progress{position:fixed;top:0;left:0;height:1px;background:var(--gold);z-index:9995;transition:width .15s linear}


  .menu-btn{display:none;background:none;border:none;color:var(--gold-light);font-size:1.3rem;cursor:pointer;padding:.3rem}
  @media(max-width:768px){
    /* ── Mobile Magazine Layout ── */
    
    /* Nav */
    .menu-btn{display:block;position:absolute;right:1rem;top:.8rem;z-index:101;background:none;border:none;color:var(--gold-light);font-size:1.3rem;cursor:pointer;padding:.3rem}
    .nav-inner{display:none;flex-direction:column;position:absolute;top:3rem;left:0;right:0;background:rgba(8,6,4,.95);padding:1rem;gap:.8rem}
    .nav.menu-open .nav-inner{display:flex}
    .nav-links{flex-direction:column;gap:.5rem}

    /* Hero — magazine cover */
    .hero{padding:0;align-items:flex-end}
    .hero-content{max-width:100%;padding:0 1.5rem 3rem}
    .hero h1{font-size:2.5rem;letter-spacing:.3em}
    .hero .intro{font-size:.7rem;line-height:1.8;max-width:260px}

    /* Macro type — large breathing space */
    .macro-type{padding:5rem 1.5rem}
    .macro-type .big{font-size:1.5rem;line-height:1.8}

    /* Sections — magazine editorial */
    .block-head,.section-header{padding:4rem 1.5rem 1rem;flex-direction:column;align-items:flex-start;gap:.5rem}
    .block-head .left h2,.section-header h2{font-size:1.6rem}
    .more-link{margin-top:.5rem}

    /* 01 + 03 MASONRY → Magazine full-bleed cards */
    .masonry{display:flex!important;flex-direction:column;gap:2.5rem;padding:2rem 0}
    .masonry .duo-item{width:100%;border-radius:0;margin:0}
    .masonry .duo-item img{width:100%;height:auto;object-fit:cover;border-radius:0}
    /* Varied aspect ratios for editorial rhythm */
    .masonry .duo-item:nth-child(odd) img{aspect-ratio:3/4}
    .masonry .duo-item:nth-child(even) img{aspect-ratio:4/3}
    .masonry .duo-item:first-child img{aspect-ratio:4/5}
    /* Full-bleed: remove padding on image containers */
    .masonry .duo-item{overflow:visible}
    .masonry .duo-item img{width:100vw;margin-left:50%;transform:translateX(-50%);max-width:100vw}
    /* Reset grid positioning */
    .masonry>*{grid-column:auto!important;grid-row:auto!important}
    /* Overlay — magazine caption style */
    .duo-overlay{position:relative;opacity:1;transform:none;background:none;padding:.8rem 1.5rem 0}
    .duo-overlay .duo-title{font-size:.9rem;color:var(--text-bright)}
    .duo-overlay .duo-meta{font-size:.65rem}
    .duo-label{display:none}

    /* 02 HScroll — vertical stack with full bleed images */
    .hscroll-wrap{border:none;padding:2rem 0}
    .hscroll-track{flex-direction:column;gap:3rem;overflow-x:visible;padding:0}
    .hscroll-card{width:100%!important;scroll-snap-align:none;border-radius:0}
    .hscroll-card img{width:100vw;margin-left:50%;transform:translateX(-50%);aspect-ratio:3/2}
    .hscroll-head{padding:0 1.5rem 1rem}
    .hscroll-dots{display:none}

    /* Booking — full width editorial */
    .booking-section{padding:3rem 1.5rem}
    .booking-cards{flex-direction:column;gap:2rem}
    .bk-card{min-width:100%!important;flex:auto!important;border-radius:0}
    .bk-photo{min-height:300px!important}
    .bk-photo img{width:100vw;margin-left:50%;transform:translateX(-50%)}

    /* About — magazine portrait */
    .about-section{flex-direction:column!important;padding:3rem 1.5rem;gap:2rem}
    .about-visual{flex:auto!important;width:100%;max-height:none}
    .about-visual img{aspect-ratio:4/5;object-fit:cover;max-height:80vh}
    .about-text .timeline{grid-template-columns:1fr}

    /* Contact — magazine page */
    .contact{padding:5rem 1.5rem}
    .contact-inner{max-width:100%}
    .contact-grid{grid-template-columns:1fr!important;gap:1.5rem}
    .contact-col{padding:2rem 1.5rem;text-align:left}
    .contact-brand{font-size:.9rem;line-height:1.8}

    /* Footer */
    .footer-tags{gap:.4rem;padding:0 1rem}
    .footer-links{flex-wrap:wrap;gap:1rem}
    footer{padding:3rem 1.5rem 2rem}

    /* Reveal animation — quicker for mobile */
    .reveal{transform:translateY(20px)}
  }
